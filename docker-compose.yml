services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: crowd-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: crowd-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    